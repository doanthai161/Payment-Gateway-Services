global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: payment-service
    metrics_path: /metrics
    static_configs:
      - targets: ["payment-service:8000"]

  - job_name: order-service
    metrics_path: /metrics
    static_configs:
      - targets: ["order-service:8001"]
